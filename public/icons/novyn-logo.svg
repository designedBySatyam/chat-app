<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main gradient: cyan to violet -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="50%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#FF4ECD"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7B61FF" flood-opacity="0.5"/>
    </filter>

    <!-- Bubble gradient -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.28"/>
    </linearGradient>

    <!-- Stroke gradient -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#FF4ECD"/>
    </linearGradient>

    <!-- Background circle gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#14113A"/>
      <stop offset="100%" stop-color="#060412"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="186" fill="none" stroke="url(#strokeGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle noise grain overlay circle (decorative arcs) -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#strokeGrad)" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.2"/>

  <!-- Main chat bubble shape -->
  <g filter="url(#softShadow)">
    <!-- Bubble body -->
    <path d="M118 130 Q118 100 148 100 L255 100 Q285 100 285 130 L285 210 Q285 240 255 240 L230 240 L215 265 L200 240 L148 240 Q118 240 118 210 Z"
          fill="url(#bubbleGrad)"
          stroke="url(#strokeGrad)"
          stroke-width="2.5"/>
  </g>

  <!-- Second smaller bubble (bottom right) -->
  <g opacity="0.55">
    <path d="M210 248 Q210 234 222 234 L268 234 Q280 234 280 248 L280 278 Q280 292 268 292 L248 292 L242 304 L235 292 L222 292 Q210 292 210 278 Z"
          fill="url(#bubbleGrad)"
          stroke="url(#strokeGrad)"
          stroke-width="1.5"/>
  </g>

  <!-- "N" lettermark -->
  <g filter="url(#glow)">
    <text x="200" y="205"
          font-family="'Georgia', 'Palatino', serif"
          font-size="108"
          font-weight="700"
          fill="url(#mainGrad)"
          text-anchor="middle"
          dominant-baseline="middle"
          letter-spacing="-4">N</text>
  </g>

  <!-- Wordmark: novyn -->
  <text x="200" y="338"
        font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
        font-size="28"
        font-weight="300"
        fill="#EEEEFF"
        text-anchor="middle"
        letter-spacing="10"
        opacity="0.85">NOVYN</text>

  <!-- Tagline dot accent -->
  <circle cx="200" cy="358" r="3" fill="url(#mainGrad)" opacity="0.7"/>

  <!-- Three dots inside bubble (chat indicator dots, decorative) -->
  <circle cx="163" cy="172" r="7" fill="url(#mainGrad)" opacity="0.25"/>
  <circle cx="163" cy="172" r="4" fill="url(#mainGrad)" opacity="0.5"/>
</svg>
