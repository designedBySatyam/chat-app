<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- App icon rounded background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0B1F"/>
      <stop offset="100%" stop-color="#060311"/>
    </linearGradient>

    <!-- Main icon fill gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00EDD1"/>
      <stop offset="55%" stop-color="#7257FF"/>
      <stop offset="100%" stop-color="#FF3FBF"/>
    </linearGradient>

    <!-- Comet trail gradient (fades to transparent) -->
    <linearGradient id="trailGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7257FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3FBF" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow for the bubble -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Deep glow layer -->
    <filter id="deepGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle glow -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shine gradient -->
    <radialGradient id="shineGrad" cx="38%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle background radial glow -->
  <radialGradient id="ambientGlow" cx="60%" cy="38%" r="55%">
    <stop offset="0%" stop-color="#7257FF" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#7257FF" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#ambientGlow)"/>

  <!-- ============================================
       CONCEPT: A speech bubble whose tail is a 
       comet — speed, energy, new conversations
       ============================================ -->

  <!-- Deep glow shadow behind the whole mark -->
  <g filter="url(#deepGlow)" opacity="0.6">
    <!-- Comet tail (wide triangular sweep, bottom-left) -->
    <path d="M268 290 L108 420 L175 270 Z" fill="url(#trailGrad)"/>
    <!-- Bubble -->
    <circle cx="285" cy="210" r="130" fill="#7257FF"/>
  </g>

  <!-- Comet tail -->
  <path d="M268 295 L112 422 L178 272 Z" fill="url(#trailGrad)" opacity="0.9"/>

  <!-- Secondary thinner tail streak -->
  <path d="M255 305 L88 444 L155 285 Z" fill="url(#trailGrad)" opacity="0.35"/>

  <!-- Main speech bubble circle -->
  <g filter="url(#glow)">
    <circle cx="285" cy="205" r="128" fill="url(#iconGrad)"/>
  </g>

  <!-- Inner shine highlight -->
  <circle cx="285" cy="205" r="128" fill="url(#shineGrad)"/>

  <!-- Three horizontal message lines inside bubble -->
  <g opacity="0.95">
    <!-- Line 1 -->
    <rect x="225" y="175" width="110" height="12" rx="6" fill="#FFFFFF" opacity="0.90"/>
    <!-- Line 2 -->
    <rect x="225" y="199" width="80" height="12" rx="6" fill="#FFFFFF" opacity="0.65"/>
    <!-- Line 3 -->
    <rect x="225" y="223" width="95" height="12" rx="6" fill="#FFFFFF" opacity="0.45"/>
  </g>

  <!-- Comet trail sparkle dots -->
  <g filter="url(#dotGlow)">
    <circle cx="194" cy="346" r="6" fill="#FF3FBF" opacity="0.85"/>
    <circle cx="164" cy="375" r="4" fill="#FF3FBF" opacity="0.65"/>
    <circle cx="138" cy="400" r="3" fill="#C97FFF" opacity="0.5"/>
    <circle cx="217" cy="320" r="4.5" fill="#7257FF" opacity="0.6"/>
    <circle cx="122" cy="415" r="2" fill="#FF3FBF" opacity="0.35"/>
  </g>

  <!-- Tiny star particle top-right (energetic nova feel) -->
  <g filter="url(#dotGlow)" opacity="0.7">
    <circle cx="390" cy="108" r="3.5" fill="#00EDD1"/>
    <circle cx="408" cy="130" r="2" fill="#00EDD1" opacity="0.5"/>
    <circle cx="374" cy="125" r="2.5" fill="#7257FF" opacity="0.6"/>
  </g>

</svg>
