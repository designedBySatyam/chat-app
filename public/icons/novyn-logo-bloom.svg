<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180">
  <defs>
    <!-- Brand gradient: violet → blush -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#e879a0"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Bubble fill: soft pastel lavender -->
    <linearGradient id="bubbleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fce7f3" stop-opacity="1"/>
    </linearGradient>

    <!-- Inner shine -->
    <radialGradient id="shine" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow -->
    <filter id="softDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#c084fc" flood-opacity="0.22"/>
    </filter>

    <!-- Glow for N -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Comet tail gradient -->
    <linearGradient id="tail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Cream background pill -->
  <rect x="0" y="0" width="480" height="180" rx="28" fill="#fff8fd"/>

  <!-- Soft pastel aurora blob top-left -->
  <ellipse cx="70" cy="40" rx="110" ry="70" fill="#f3e8ff" opacity="0.55"/>
  <!-- Blush blob bottom-right -->
  <ellipse cx="420" cy="150" rx="90" ry="60" fill="#fce7f3" opacity="0.50"/>
  <!-- Mint blob center -->
  <ellipse cx="240" cy="160" rx="80" ry="40" fill="#d1fae5" opacity="0.25"/>

  <!-- ── Icon mark ── -->
  <g filter="url(#softDrop)">
    <!-- Main speech bubble -->
    <path d="M32 42 Q32 22 52 22 L128 22 Q148 22 148 42 L148 98 Q148 118 128 118 L108 118 L96 136 L84 118 L52 118 Q32 118 32 98 Z"
          fill="url(#bubbleFill)"
          stroke="url(#brandGrad)"
          stroke-width="2.5"/>
    <!-- Shine overlay -->
    <path d="M32 42 Q32 22 52 22 L128 22 Q148 22 148 42 L148 98 Q148 118 128 118 L108 118 L96 136 L84 118 L52 118 Q32 118 32 98 Z"
          fill="url(#shine)"/>
  </g>

  <!-- "N" monogram inside bubble -->
  <text x="90" y="92"
        font-family="'Syne', 'Georgia', serif"
        font-size="72"
        font-weight="800"
        fill="url(#brandGrad)"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#textGlow)">N</text>

  <!-- Tiny comet sparkle dots (top-right of bubble) -->
  <circle cx="140" cy="30" r="3.5" fill="#f472b6" opacity="0.70"/>
  <circle cx="152" cy="22" r="2.2" fill="#c084fc" opacity="0.55"/>
  <circle cx="156" cy="36" r="1.8" fill="#f9a8d4" opacity="0.45"/>

  <!-- ── Wordmark ── -->
  <text x="174" y="80"
        font-family="'Syne', 'Trebuchet MS', sans-serif"
        font-size="54"
        font-weight="800"
        letter-spacing="-1.5"
        fill="url(#brandGrad)">novyn</text>

  <!-- Tagline -->
  <text x="176" y="112"
        font-family="'Geist Mono', 'Courier New', monospace"
        font-size="13"
        font-weight="400"
        letter-spacing="3"
        fill="#9333ea"
        opacity="0.55">WHERE MOMENTS CONNECT</text>

  <!-- Decorative comet tail under wordmark -->
  <rect x="176" y="120" width="240" height="2.5" rx="2" fill="url(#tail)"/>
</svg>
