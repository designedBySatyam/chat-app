<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1423"/>
      <stop offset="100%" stop-color="#070b16"/>
    </linearGradient>

    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cb9fd"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#1e3a6e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Full circular background for badge use -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="256" fill="url(#bgGlow)"/>

  <!-- N lettermark centered and scaled for circular badge -->
  <g filter="url(#glow)">
    <!-- Left bar -->
    <rect x="108" y="130" width="68" height="252" rx="12" fill="url(#blue)"/>
    <!-- Right bar -->
    <rect x="336" y="130" width="68" height="252" rx="12" fill="url(#blue)"/>
    <!-- Diagonal -->
    <line 
      x1="142" y1="130" 
      x2="370" y2="382" 
      stroke="url(#blue)" 
      stroke-width="68" 
      stroke-linecap="square"
    />
  </g>
</svg>
