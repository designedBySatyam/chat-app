<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: warm cream -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#fff0f8"/>
    </radialGradient>

    <!-- Brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#e879a0"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Bubble body -->
    <linearGradient id="bubbleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e9ff"/>
      <stop offset="100%" stop-color="#fde8f4"/>
    </linearGradient>

    <!-- Shine on bubble -->
    <radialGradient id="bubbleShine" cx="32%" cy="28%" r="52%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora blob gradient 1 (lavender) -->
    <radialGradient id="aurora1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Aurora blob gradient 2 (blush) -->
    <radialGradient id="aurora2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fce7f3" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fce7f3" stop-opacity="0"/>
    </radialGradient>
    <!-- Aurora blob gradient 3 (mint) -->
    <radialGradient id="aurora3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow shadow for icon -->
    <filter id="iconGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#c084fc" flood-opacity="0.25"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bgGrad)"/>

  <!-- Aurora blobs -->
  <ellipse cx="120" cy="110" rx="190" ry="150" fill="url(#aurora1)" opacity="0.8"/>
  <ellipse cx="390" cy="400" rx="170" ry="140" fill="url(#aurora2)" opacity="0.75"/>
  <ellipse cx="280" cy="300" rx="130" ry="110" fill="url(#aurora3)" opacity="0.55"/>

  <!-- Outer ring accent -->
  <rect x="3" y="3" width="506" height="506" rx="112" fill="none"
        stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.18"/>

  <!-- ── Main speech bubble ── -->
  <g filter="url(#shadow)">
    <path d="M100 140 Q100 105 135 105 L380 105 Q415 105 415 140 L415 290 Q415 325 380 325 L310 325 L282 368 L254 325 L135 325 Q100 325 100 290 Z"
          fill="url(#bubbleFill)"
          stroke="url(#brandGrad)"
          stroke-width="3"/>
    <!-- Shine -->
    <path d="M100 140 Q100 105 135 105 L380 105 Q415 105 415 140 L415 290 Q415 325 380 325 L310 325 L282 368 L254 325 L135 325 Q100 325 100 290 Z"
          fill="url(#bubbleShine)"/>
  </g>

  <!-- N monogram -->
  <text x="258" y="242"
        font-family="'Syne', 'Georgia', serif"
        font-size="148"
        font-weight="800"
        fill="url(#brandGrad)"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#textGlow)">N</text>

  <!-- Comet sparkle cluster (top-right) -->
  <g opacity="0.9">
    <circle cx="398" cy="116" r="5.5" fill="#f472b6"/>
    <circle cx="416" cy="100" r="3.5" fill="#c084fc"/>
    <circle cx="424" cy="118" r="2.5" fill="#f9a8d4"/>
    <circle cx="408" cy="88"  r="2"   fill="#e879a0" opacity="0.7"/>
  </g>

  <!-- Small decorative second bubble (bottom right, smaller) -->
  <g opacity="0.55">
    <path d="M340 350 Q340 336 352 336 L420 336 Q432 336 432 350 L432 388 Q432 402 420 402 L395 402 L388 414 L381 402 L352 402 Q340 402 340 388 Z"
          fill="url(#bubbleFill)"
          stroke="url(#brandGrad)"
          stroke-width="1.8"/>
  </g>

  <!-- Three message lines in small bubble -->
  <rect x="353" y="353" width="60" height="7" rx="3.5" fill="url(#brandGrad)" opacity="0.50"/>
  <rect x="353" y="366" width="44" height="7" rx="3.5" fill="url(#brandGrad)" opacity="0.35"/>

  <!-- Tiny mint accent dot bottom-left -->
  <circle cx="108" cy="400" r="10" fill="#d1fae5" opacity="0.8"/>
  <circle cx="108" cy="400" r="6"  fill="#10b981" opacity="0.45"/>
</svg>
