<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Novyn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="page">

  <!-- Background -->
  <div class="brand" aria-hidden="true"></div>

  <!-- Auth card -->
  <div class="form-side">
    <div class="form-inner">

      <!-- Logo -->
      <div class="card-logo">
        <div class="card-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="card-logo-name">Novyn</span>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs" id="authTabs">
        <div class="tab-glider"></div>
        <button class="auth-tab-btn active" id="tabSignIn" onclick="go('si')">Sign in</button>
        <button class="auth-tab-btn" id="tabSignUp" onclick="go('su')">Create account</button>
      </div>

      <!-- Hidden heading track (login.js compat) -->
      <div class="slider" style="display:none;">
        <div class="track" id="h-track">
          <div class="slide"><div class="f-head"><h2>Sign in</h2></div></div>
          <div class="slide"><div class="f-head"><h2>Create account</h2></div></div>
        </div>
      </div>

      <!-- Fields slider -->
      <div class="slider">
        <div class="track" id="f-track">

          <!-- SIGN IN -->
          <div class="slide">
            <div class="field">
              <label>Email or username</label>
              <div class="input-wrap">
                <span class="ico">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
                  </svg>
                </span>
                <input id="loginIdentifier" name="identifier" type="text"
                  placeholder="you@example.com or @username"
                  autocomplete="username email">
              </div>
            </div>

            <div class="field">
              <label>Password</label>
              <div class="input-wrap">
                <span class="ico">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                </span>
                <input type="password" id="pw1" placeholder="••••••••" autocomplete="current-password">
                <button class="eye" onclick="togglePw('pw1',this)" tabindex="-1" type="button">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="ei">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="meta">
              <label><input type="checkbox"> Remember me</label>
              <a href="#">Forgot password?</a>
            </div>

            <button class="btn-primary" id="signInBtn" type="button" onclick="ripple(event,this)">
              Sign in
            </button>

            <div class="divider"><div class="div-line"></div><span>or continue with</span><div class="div-line"></div></div>

            <button class="btn-google" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Google
            </button>
          </div>

          <!-- SIGN UP -->
          <div class="slide">
            <div class="row2">
              <div class="field">
                <label>First name</label>
                <div class="input-wrap">
                  <span class="ico">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                  </span>
                  <input type="text" placeholder="Alex" autocomplete="given-name">
                </div>
              </div>
              <div class="field">
                <label>Last name</label>
                <div class="input-wrap">
                  <span class="ico">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                  </span>
                  <input type="text" placeholder="Rivera" autocomplete="family-name">
                </div>
              </div>
            </div>

            <div class="field">
              <label>Email address</label>
              <div class="input-wrap">
                <span class="ico">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
                  </svg>
                </span>
                <input id="signupEmail" name="identifier" type="email" placeholder="you@example.com" autocomplete="email">
              </div>
            </div>

            <div class="field">
              <label>Password</label>
              <div class="input-wrap">
                <span class="ico">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                </span>
                <input type="password" id="pw2" placeholder="Create a password"
                  autocomplete="new-password" oninput="checkStrength(this)">
                <button class="eye" onclick="togglePw('pw2',this)" tabindex="-1" type="button">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="ei">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <div class="strength">
                <div class="seg" id="s1"></div>
                <div class="seg" id="s2"></div>
                <div class="seg" id="s3"></div>
                <div class="seg" id="s4"></div>
              </div>
            </div>

            <button class="btn-primary" id="signUpBtn" type="button"
              onclick="ripple(event,this)" style="margin-top:8px">
              Create account
            </button>

            <div class="divider"><div class="div-line"></div><span>or</span><div class="div-line"></div></div>

            <button class="btn-google" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Sign up with Google
            </button>

            <div class="terms">By signing up you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a></div>
          </div>

        </div>
      </div>

      <div class="auth-message" id="authMessage" role="status" aria-live="polite"></div>

      <div class="card-footer">
        <span class="card-footer-dot"></span>
        End-to-end encrypted · 2,400+ people on the network
      </div>

    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var tabs   = document.getElementById('authTabs');
    var btnSI  = document.getElementById('tabSignIn');
    var btnSU  = document.getElementById('tabSignUp');
    window.go = function(t) {
      var su = t === 'su';
      document.getElementById('f-track').classList.toggle('slid', su);
      document.getElementById('h-track').classList.toggle('slid', su);
      tabs.classList.toggle('on-signup', su);
      btnSI.classList.toggle('active', !su);
      btnSU.classList.toggle('active', su);
    };
  });
</script>
<script src="login.js"></script>
</body>
</html>
